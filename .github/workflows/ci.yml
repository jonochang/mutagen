name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    name: Lint & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: cargo fmt
        run: nix develop --command cargo fmt --check
      - name: cargo clippy
        run: nix develop --command cargo clippy --all-targets -- -D warnings
      - name: cargo deny
        run: nix develop --command cargo deny check

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: cargo nextest
        run: nix develop --command cargo nextest run --profile ci
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/nextest/ci/results.xml

  test-ruby:
    name: Ruby Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Bundle install
        run: nix develop --command bundle install
      - name: Compile native extension
        run: nix develop --command bundle exec rake compile
      - name: RSpec
        run: nix develop --command bundle exec rspec

  build:
    name: Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: cargo build --release
        run: nix develop --command cargo build --release
